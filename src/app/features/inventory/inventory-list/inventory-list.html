<input #searchInput type="text" id="searchInput" placeholder="Search item"/>
<button (click)="searchInput.focus()">Focus Search</button>

<app-panel>
  <button (click)="openModal()">Open Inventory Modal</button>
  <div panel-body>
    @for(item of inventoryService.items(); track item.id) {
      <app-item-card [item]="item" (removed)="inventoryService.removeItem($event)" (equipped)="inventoryService.toggleEquip($event)" [showLink]="true"></app-item-card>
    }
  </div>
</app-panel>


<app-add-item-form (added)="inventoryService.addItem($event)"></app-add-item-form>

<app-modal>
  <h2 modal-header>Inventory Modal Header</h2>
  <p modal-body>Inventory Modal Body</p>
</app-modal>
