@let l=legend();

@if(l){
  <p>
    name: {{l.name}} <br>
    class: {{l.class}} <br>
    level: {{l.level}} <br>
    story: {{l.story}} <br>
    quote: {{l.quote}} <br>
    stats: <br>
      - force: {{l.stats.force}} <br>
      - defense: {{l.stats.defense}} <br>
      - magic: {{l.stats.magic}} <br>
  </p>
}
